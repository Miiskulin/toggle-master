services:
  postgres-auth:
    image: postgres:16
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    volumes:
    - ./auth-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql #Bind-mount
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"
    environment:
      PORT: "8001"
      DATABASE_URL: "postgres://auth_user:auth_pass@postgres-auth:5432/auth_db"
      MASTER_KEY: "admin-secreto-123"
    depends_on:
      postgres-auth:
        condition: "service_healthy"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8001/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-flag:
    image: postgres:16
    environment:
      POSTGRES_USER: flag_user
      POSTGRES_PASSWORD: flag_pass
      POSTGRES_DB: flag_db
    volumes:
    - ./flag-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flag_user -d flag_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  flag-service:
    build: ./flag-service
    ports:
      - "8002:8002"
    environment:
      PORT: "8002"
      DATABASE_URL: "postgres://flag_user:flag_pass@postgres-flag:5432/flag_db"
      AUTH_SERVICE_URL: "http://auth-service:8001"
    depends_on:
      postgres-flag:
        condition: "service_healthy"
      auth-service:
        condition: "service_healthy"

  postgres-targeting:
    image: postgres:16
    environment:
      POSTGRES_USER: targeting_user
      POSTGRES_PASSWORD: targeting_pass
      POSTGRES_DB: targeting_db
    volumes:
    - ./targeting-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U targeting_user -d targeting_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  targeting-service:
    build: ./targeting-service
    ports:
      - "8003:8003"
    environment:
      PORT: "8003"
      DATABASE_URL: "postgres://targeting_user:targeting_pass@postgres-targeting:5432/targeting_db"
      AUTH_SERVICE_URL: "http://auth-service:8001"
    depends_on:
      postgres-targeting:
        condition: "service_healthy"
      auth-service:
        condition: "service_healthy"

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
