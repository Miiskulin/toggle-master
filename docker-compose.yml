services:
  postgres-auth:
    image: postgres:16
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: "${AUTH_DB_PASSWORD}"
      POSTGRES_DB: auth_db
    volumes:
    - ./auth-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql #Bind-mount
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"
    environment:
      PORT: "8001"
      DATABASE_URL: "postgres://auth_user:${AUTH_DB_PASSWORD}@postgres-auth:5432/auth_db"
      MASTER_KEY: "${MASTER_KEY}"
    depends_on:
      postgres-auth:
        condition: "service_healthy"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8001/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-flag:
    image: postgres:16
    environment:
      POSTGRES_USER: flag_user
      POSTGRES_PASSWORD: "${FLAG_DB_PASSWORD}"
      POSTGRES_DB: flag_db
    volumes:
    - ./flag-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flag_user -d flag_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  flag-service:
    build: ./flag-service
    ports:
      - "8002:8002"
    environment:
      PORT: "8002"
      DATABASE_URL: "postgres://flag_user:${FLAG_DB_PASSWORD}@postgres-flag:5432/flag_db"
      AUTH_SERVICE_URL: "http://auth-service:8001"
    depends_on:
      postgres-flag:
        condition: "service_healthy"
      auth-service:
        condition: "service_healthy"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-targeting:
    image: postgres:16
    environment:
      POSTGRES_USER: targeting_user
      POSTGRES_PASSWORD: "${TARGETING_DB_PASSWORD}"
      POSTGRES_DB: targeting_db
    volumes:
    - ./targeting-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U targeting_user -d targeting_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  targeting-service:
    build: ./targeting-service
    ports:
      - "8003:8003"
    environment:
      PORT: "8003"
      DATABASE_URL: "postgres://targeting_user:${TARGETING_DB_PASSWORD}@postgres-targeting:5432/targeting_db"
      AUTH_SERVICE_URL: "http://auth-service:8001"
    depends_on:
      postgres-targeting:
        condition: "service_healthy"
      auth-service:
        condition: "service_healthy"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  dynamodb-local:
    image: amazon/dynamodb-local
    ports:
      - "8000:8000"

  analytics-service:
    build: ./analytics-service
    ports:
      - "8005:8005"
    environment:
      PORT: "8005"
      AWS_REGION: "us-east-1"
      AWS_SQS_URL: "${AWS_SQS_URL}"
      AWS_DYNAMODB_TABLE: "toggle-analytics"
      AWS_ENDPOINT_URL_DYNAMODB: "http://dynamodb-local:8000"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
    depends_on:
      - dynamodb-local

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  evaluation-service:
    build: ./evaluation-service
    ports:
      - "8004:8004"
    environment:
      PORT: "8004"
      REDIS_URL: "redis://redis:6379"
      FLAG_SERVICE_URL: "http://flag-service:8002"
      TARGETING_SERVICE_URL: "http://targeting-service:8003"
      SERVICE_API_KEY: "${SERVICE_API_KEY}"
      AWS_REGION: "us-east-1"
      AWS_SQS_URL: "${AWS_SQS_URL}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
    depends_on:
      auth-service:
        condition: "service_healthy"
      flag-service:
        condition: "service_healthy"
      targeting-service:
        condition: "service_healthy"